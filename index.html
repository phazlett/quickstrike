<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickStrike for TastyTrade</title>
  <link rel="stylesheet" href="lib/style.css" />
  <link rel="icon" href="data:,">
</head>

<body>
  <input type="hidden" id="option-symbol" />

  <section id="loading-section" class="loading-section hidden">
    <div class="loading-card">
      <h2 id="loading-message">Loading...</h2>
      <div id="loading-error" class="status hidden"></div>
      <button id="btn-loading-retry" class="hidden">Retry</button>
    </div>
  </section>

  <!-- ── HEADER ── (hidden until authenticated) -->
  <header id="app-header" class="hidden">
    <div class="header-left">
      <div class="header-inputs">
        <div class="symbol-buttons">
          <button class="symbol-btn active" data-symbol="SPY">SPY</button>
          <button class="symbol-btn" data-symbol="XSP">XSP</button>
        </div>
        <select id="quantity">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="15">15</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="40">40</option>
          <option value="50">50</option>
        </select>
        <select id="account-select"></select>
      </div>
      <div class="live-price-wrap">
        <div id="live-price" class="live-price"></div>
      </div>
      <div id="chain-status" class="status"></div>
    </div>
    <div class="header-right">
      <button id="btn-logout">Logout</button>
      <div id="live-connection" class="live-connection disconnected">DISCONNECTED</div>
    </div>
  </header>

  <!-- ── CONFIGURATION ── -->
  <section id="config-section">
    <h2>QuickStrike for TastyTrade</h2>
    <button id="btn-connect">Login with TastyTrade</button>
  </section>

  <!-- ── TRADING ── (hidden until authenticated) -->
  <section id="trading-section" class="hidden">

    <div id="status-message" class="status"></div>

    <!-- ── Option Chain Display ── -->
    <div id="chain-section" class="hidden">
      <div id="chain-grid" class="chain-grid">
        <div id="chain-rows"></div>
      </div>
    </div>

    <!-- ── Order Panel ── -->
    <div id="order-section">
      <div id="env-badge"></div>

      <div class="staged-orders">

        <!-- Call Order -->
        <div class="staged-card" id="call-card">
          <div class="staged-card-header call-header">Call</div>
          <div class="staged-card-layout">
            <div class="staged-card-fields">
              <div class="staged-symbol" id="call-symbol">No call selected</div>
              <div class="staged-action" id="call-action"></div>
              <div class="bp-impact-row">
                <span class="bp-label">BPR</span>
                <span class="bp-value" id="call-bp-reduction">--</span>
              </div>
            </div>
            <div>
              <button class="btn-disabled" id="btn-submit-call" disabled>Submit</button>
            </div>
          </div>
        </div>

        <!-- Put Order -->
        <div class="staged-card" id="put-card">
          <div class="staged-card-header put-header">Put</div>
          <div class="staged-card-layout">
            <div class="staged-card-fields">
              <div class="staged-symbol" id="put-symbol">No put selected</div>
              <div class="staged-action" id="put-action"></div>
              <div class="bp-impact-row">
                <span class="bp-label">BPR</span>
                <span class="bp-value" id="put-bp-reduction">--</span>
              </div>
            </div>
            <div>
              <button class="btn-disabled" id="btn-submit-put" disabled>Submit</button>
            </div>
          </div>
        </div>

      </div>

    </div>

    <div id="positions-section">
      <h2>Positions</h2>
      <div class="positions-table-wrap">
        <table class="positions-table">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Quantity</th>
              <th>Expiration</th>
              <th>Strike</th>
              <th>P/L</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="positions-rows"></tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="config.js"></script>
  <script src="lib/positions-manager.js"></script>
  <script src="lib/api-client.js"></script>
  <script src="lib/dxlink-manager.js"></script>
  <script src="lib/auth-manager.js"></script>
  <script src="lib/bootstrap-manager.js"></script>
  <script src="lib/app.js"></script>
</body>

</html>
